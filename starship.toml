"$schema" = 'https://starship.rs/config-schema.json'
scan_timeout = 500
command_timeout = 500

format = """
[](red)\
$os\
$username\
[](fg:red bg:peach)\
$directory\
[](fg:peach bg:yellow)\
$python\
$conda\
[](fg:yellow bg:green)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
[](fg:green bg:blue)\
$git_branch\
$git_status\
${custom.git_clean}\
[](fg:blue bg:mauve)\
$git_commit\
[](fg:mauve)\
$line_break\
$character"""

right_format = """
$cmd_duration\
$time"""

palette = 'catppuccin_mocha'

[os]
disabled = false
style = "bg:red fg:crust"

[os.symbols]
Windows = ""
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "󰣇"
Artix = "󰣇"
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"

[username]
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[ $user ]($style)'

[directory]
home_symbol = ""
style = "bg:peach fg:crust"
format = "[ [$read_only](bold bg:peach fg:1)$path ]($style)"
truncation_length = 2
truncation_symbol = "…/"
truncate_to_repo = false

[git_branch]
symbol = ""
style = "fg:crust bg:blue"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "fg:crust bg:blue"
format = '[($ahead_behind$all_status)]($style)'
# Red
conflicted = '[⤭ ](bg:blue fg:9)'
deleted = '[✘ ](bg:blue fg:9)'
diverged = '[⥮ ](bg:blue fg:9)'
# Orange
behind = '[⤓ ](bg:blue fg:202)'
modified = '[ ](bg:blue fg:202)'
# Yellow
untracked = '[✦ ](bg:blue fg:11)'
# Green
staged = '[✚ ](bg:blue fg:82)'
ahead = '[⤒ ](bg:blue fg:82)'
# Blue
stashed = '[☑ ](bg:blue fg:27)'
# Purple
renamed = '[ ](bg:blue fg:5)'

[custom.git_clean]
require_repo = true
command = "echo '✔︎ '"
when = 'test -z "$(git status --porcelain)"'
style = "fg:82 bg:blue"
format = "[$output ]($style)"

[git_commit]
disabled = false
commit_hash_length = 6
only_detached = false
tag_disabled = false
tag_symbol = ' '
style = "bg:mauve fg:crust"
format = '[ ($tag )󰜘 $hash ]($style)'

[python]
symbol = ""
style = "bg:yellow fg:crust"
version_format = "${major}.${minor}"
format = '[ $symbol (\([$virtualenv](bold $style)\) )($version )]($style)'

[conda]
symbol = ""
style = "bg:yellow fg:crust"
format = '[ $symbol $environment ]($style)'
ignore_base = false

[c]
symbol = ""
style = "bg:green fg:crust"
format = '[ $symbol ($version )]($style)'

[rust]
symbol = ""
style = "bg:green fg:crust"
format = '[ $symbol ($version )]($style)'

[golang]
symbol = ""
style = "bg:green fg:crust"
format = '[ $symbol ($version )]($style)'

[nodejs]
symbol = ""
style = "bg:green fg:crust"
format = '[ $symbol ($version )]($style)'

[php]
symbol = ""
style = "bg:green fg:crust"
format = '[ $symbol ($version )]($style)'

[java]
symbol = ""
style = "bg:green fg:crust"
format = '[ $symbol ($version )]($style)'

[kotlin]
symbol = ""
style = "bg:green fg:crust"
format = '[ $symbol ($version )]($style)'

[haskell]
symbol = ""
style = "bg:green fg:crust"
format = '[ $symbol ($version )]($style)'

[docker_context]
symbol = ""
style = "bg:sapphire fg:crust"
format = '[ $symbol ($context )]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[❯](bold fg:82)'
error_symbol = '[❯](bold fg:9)'
vimcmd_symbol = '[❮](bold fg:green)'
vimcmd_replace_one_symbol = '[❮](bold fg:lavender)'
vimcmd_replace_symbol = '[❮](bold fg:lavender)'
vimcmd_visual_symbol = '[❮](bold fg:yellow)'

[cmd_duration]
disabled = false
style = "fg:peach"
format = "[󰔟 $duration ]($style)"
min_time = 3_000  # 3s
show_milliseconds = false
show_notifications = false

[time]
disabled = false
time_format = "%T"
style = 'fg:blue'
format = '[ $time]($style)'

