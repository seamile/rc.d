format = '[ $user ]($style)'

[directory]
home_symbol = "ÔÄē"
style = "bg:peach fg:crust"
format = "[ $read_only$path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"
truncate_to_repo = false

[git_branch]
symbol = "Óú•"
style = "fg:crust bg:blue"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "fg:crust bg:blue"
format = '[($ahead_behind$all_status)]($style)'
# Red
conflicted = '[‚§≠ ](bg:blue fg:9)'
deleted = '[‚úė ](bg:blue fg:9)'
diverged = '[‚•ģ ](bg:blue fg:9)'
# Orange
behind = '[‚§ď ](bg:blue fg:208)'
modified = '[‚öęÔłé](bg:blue fg:208) '
# Yellow
untracked = '[ūüüÜ ](bg:blue fg:11)'
# Green
staged = '[ūüěß ](bg:blue fg:10)'
ahead = '[‚§í ](bg:blue fg:10)'
# Blue
stashed = '[‚ėĎ ](bg:blue fg:27)'
# Purple
renamed = '[ÔÄě ](bg:blue fg:5)'

[git_commit]
disabled = false
commit_hash_length = 6
only_detached = false
tag_disabled = false
tag_symbol = 'ÔÄ§ '
style = "bg:mauve fg:crust"
format = '[ ($tag )ůįúė $hash ]($style)'

[nodejs]
symbol = "Óúė"
style = "bg:green fg:crust"
format = '[ $symbol( $version) ]($style)'

[c]
symbol = "Óėě"
style = "bg:green fg:crust"
format = '[ $symbol( $version) ]($style)'

[rust]
symbol = "Óě®"
style = "bg:green fg:crust"
format = '[ $symbol( $version) ]($style)'

[golang]
symbol = "Óėß"
style = "bg:green fg:crust"
format = '[ $symbol( $version) ]($style)'

[php]
symbol = "Óėą"
style = "bg:green fg:crust"
format = '[ $symbol( $version) ]($style)'

[java]
symbol = "ÓČĖ"
style = "bg:green fg:crust"
format = '[ $symbol( $version) ]($style)'

[kotlin]
symbol = "Óėī"
style = "bg:green fg:crust"
format = '[ $symbol( $version) ]($style)'

[haskell]
symbol = "Óėü"
style = "bg:green fg:crust"
format = '[ $symbol( $version) ]($style)'

[python]
symbol = "ÓėÜ"
style = "bg:yellow fg:crust"
version_format = "${major}.${minor}"
format = '[ $symbol( \($virtualenv\))( $version) ]($style)'

[docker_context]
symbol = "ÔĆą"
style = "bg:sapphire fg:crust"
format = '[ $symbol( $context) ]($style)'

[conda]
symbol = " ÔĄĆ"
style = "fg:crust bg:yellow"
format = '[$symbol$environment ]($style)'
ignore_base = false

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[‚ĚĮ](bold fg:10)'
error_symbol = '[‚ĚĮ](bold fg:9)'
vimcmd_symbol = '[‚Ěģ](bold fg:green)'
vimcmd_replace_one_symbol = '[‚Ěģ](bold fg:lavender)'
vimcmd_replace_symbol = '[‚Ěģ](bold fg:lavender)'
vimcmd_visual_symbol = '[‚Ěģ](bold fg:yellow)'

[cmd_duration]
disabled = false
style = "fg:peach"
format = "[ůįĒü $duration ]($style)"
min_time = 3_000  # 3s
show_milliseconds = false
show_notifications = false

[time]
disabled = false
time_format = "%T"
style = 'fg:blue'
format = '[Ôźļ $time]($style)'

