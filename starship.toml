"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](red)\
$os\
$username\
[](fg:red bg:peach)\
$directory\
[](fg:peach bg:yellow)\
$python\
$conda\
[](fg:yellow bg:green)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
[](fg:green bg:sapphire)\
$git_branch\
$git_status\
[](fg:sapphire bg:lavender)\
$time\
[ ](fg:lavender)\
$line_break\
$character"""

right_format = """
$cmd_duration\
$git_commit"""

palette = 'catppuccin_mocha'

[os]
disabled = false
style = "bg:red fg:crust"

[os.symbols]
Windows = ""
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "󰣇"
Artix = "󰣇"
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"

[username]
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[ $user ]($style)'

[directory]
style = "bg:peach fg:crust"
format = "[ $read_only$path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = ""
style = "fg:crust bg:sapphire"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "fg:crust bg:sapphire"
format = '[($ahead_behind$all_status)]($style)'
conflicted = '[⤭ ](fg:error bg:sapphire)'
ahead = '⤒ '
behind = '⤓ '
diverged = '[ᚶ ](fg:#ff6600 bg:sapphire)'
untracked = '[✦ ](fg:#ff6600 bg:sapphire)'
stashed = '☑ '
modified = '[⚫︎](fg:error bg:sapphire) '
staged = '✚ '
renamed = ' '
deleted = '[✘ ](fg:error bg:sapphire)'

[git_commit]
disabled = false
commit_hash_length = 7
only_detached = false
tag_disabled = true
style = 'fg:blue'
format = '[ $hash ]($style) '

[nodejs]
symbol = ""
style = "bg:green fg:crust"
format = '[ $symbol( $version) ]($style)'

[c]
symbol = " "
style = "bg:green fg:crust"
format = '[ $symbol( $version) ]($style)'

[rust]
symbol = ""
style = "bg:green fg:crust"
format = '[ $symbol( $version) ]($style)'

[golang]
symbol = ""
style = "bg:green fg:crust"
format = '[ $symbol( $version) ]($style)'

[php]
symbol = ""
style = "bg:green fg:crust"
format = '[ $symbol( $version) ]($style)'

[java]
symbol = " "
style = "bg:green fg:crust"
format = '[ $symbol( $version) ]($style)'

[kotlin]
symbol = ""
style = "bg:green fg:crust"
format = '[ $symbol( $version) ]($style)'

[haskell]
symbol = ""
style = "bg:green fg:crust"
format = '[ $symbol( $version) ]($style)'

[python]
symbol = ""
style = "bg:yellow fg:crust"
version_format = "${major}.${minor}"
format = '[ $symbol( \($virtualenv\))( $version) ]($style)'

[docker_context]
symbol = ""
style = "bg:sapphire fg:crust"
format = '[ $symbol( $context) ]($style)'

[conda]
symbol = "  "
style = "fg:crust bg:yellow"
format = '[$symbol$environment ]($style)'
ignore_base = false

[time]
disabled = false
time_format = "%R"
style = "bg:lavender fg:crust"
format = '[  $time ]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[❯](bold fg:green)'
error_symbol = '[✘ ❯](bold fg:error)'
vimcmd_symbol = '[❮](bold fg:green)'
vimcmd_replace_one_symbol = '[❮](bold fg:lavender)'
vimcmd_replace_symbol = '[❮](bold fg:lavender)'
vimcmd_visual_symbol = '[❮](bold fg:yellow)'

[cmd_duration]
style = "fg:flamingo"
show_milliseconds = true
format = "[󰔟 $duration ]($style)"
disabled = false
show_notifications = false
min_time_to_notify = 45000

